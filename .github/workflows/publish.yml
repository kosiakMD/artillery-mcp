name: publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm --provenance (OIDC / Trusted Publisher)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run build
      - run: npm run test:run
      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          # Used only as a fallback if Trusted Publisher is not configured.
          # Once Trusted Publisher is enabled in npm, this secret becomes unused.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

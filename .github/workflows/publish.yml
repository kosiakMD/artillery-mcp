name: publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm --provenance (OIDC / Trusted Publisher)
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run build
      - run: npm run test:run
      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          # Fallback until Trusted Publisher is enabled on the package.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  docker:
    needs: npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write    # push to ghcr.io
      id-token: write    # cosign keyless signing
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract tags + labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/artillery-mcp
            ${{ secrets.DOCKERHUB_USERNAME }}/artillery-mcp
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.title=@kosiakmd/artillery-mcp
            org.opencontainers.image.description=MCP server for Artillery 2.x — full CLI flag surface, Fargate, raw-text output parser, optional config-driven project launcher
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.source=https://github.com/kosiakMD/artillery-mcp
            org.opencontainers.image.documentation=https://github.com/kosiakMD/artillery-mcp#readme

      - name: Build + push multi-arch
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
